name: csc
description: "CSC Gold SCHEME"
publish_to: 'none'

version: 1.0.4+5  # version: version_number+build_number

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^4.0.4
  pinput: 2.2.31
  carousel_slider: ^5.0.0
  flutter_verification_code: 1.1.7
  smooth_page_indicator: ^1.1.0
  image_picker: ^0.8.5+3
  local_auth: ^2.3.0
  intl: ^0.19.0  # Downgraded for easy_localization compatibility
  lottie: ^2.0.0
  shared_preferences: ^2.0.0
  http: ^1.2.2
  provider: ^6.1.2
  open_file: ^3.5.1
  flutter_localization: ^0.2.2
  easy_localization: ^3.0.7
  flutter_countdown_timer: ^4.1.0
  image: ^4.3.0
  path_provider: ^2.1.5
  marquee: ^2.3.0
  share_plus: ^10.1.3
  flutter_spinkit: ^5.2.1
  flutter_screenutil: ^5.9.3
  printing: ^5.13.4
  pdf: ^3.10.4
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  permission_handler: ^12.0.0+1
  flutter_downloader: ^1.10.0
  dio: ^5.0.0
  pin_code_fields: ^7.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_riverpod: ^2.6.1
  fluttertoast: ^8.2.12
  connectivity_plus: ^6.1.3
  audioplayers: ^6.4.0
  intl_phone_field: ^3.2.0
  timezone: ^0.10.0
  pull_to_refresh: ^2.0.0
  badges: ^3.1.2
  flutter_colorpicker: ^1.0.3
  cached_network_image: ^3.3.0
  
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lang/
    - assets/sounds/notifications.wav

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/a.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/a.jpg"
  remove_alpha_ios: true
  min_sdk_android: 21
